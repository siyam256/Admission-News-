name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi
    - name: Prepare Secrets Configuration
      run: |
        if [ ! -f ".env" ]; then
          cp .env.example .env || touch .env
        fi
        # Turn off caching and configuration-cache in gradle.properties specifically for CI
        sed -i 's/org.gradle.caching=true/org.gradle.caching=false/g' gradle.properties
        sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1
        cache-disabled: true
        validate-wrappers: false
    - name: Accept Android SDK Licenses
      run: |
        yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true
    - name: Generate Pristine Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew clean :app:assembleDebug --no-build-cache --no-configuration-cache --stacktrace
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
