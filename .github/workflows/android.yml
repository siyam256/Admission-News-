name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Decode or Generate Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ] && [ -s "debug.keystore.base64" ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi
        
        # Verify keystore integrity; if corrupt, missing, or invalid, generate a pristine one on-the-fly
        if [ ! -f "debug.keystore" ] || ! keytool -list -keystore debug.keystore -storepass android > /dev/null 2>&1; then
          echo "debug.keystore is missing, corrupt, or invalid. Generating a pristine debug keystore on-the-fly..."
          rm -f debug.keystore
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        else
          echo "debug.keystore is valid."
        fi
    - name: Prepare Secrets Configuration
      run: |
        if [ ! -f ".env" ]; then
          cp .env.example .env || touch .env
        fi
        # Turn off caching and configuration-cache in gradle.properties specifically for CI
        sed -i 's/org.gradle.caching=true/org.gradle.caching=false/g' gradle.properties
        sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
        # Reduce JVM heap size to avoid runner memory exhaustion (OOM) on GitHub Actions CI
        sed -i 's/-Xmx4g/-Xmx3g/g' gradle.properties
        # Display memory and file properties
        free -h
        cat gradle.properties
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
        validate-wrappers: false
    - name: Accept Android SDK Licenses
      run: |
        yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean :app:assembleDebug --no-build-cache --no-configuration-cache --stacktrace
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
